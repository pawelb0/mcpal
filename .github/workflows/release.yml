name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-latest, target: aarch64-apple-darwin }
          - { os: macos-latest, target: x86_64-apple-darwin }
          - { os: ubuntu-latest, target: x86_64-unknown-linux-gnu }
          - { os: windows-latest, target: x86_64-pc-windows-msvc }
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release --target ${{ matrix.target }} -p mcpal-cli
      - name: package
        run: |
          set -eu
          mkdir -p dist
          ARCHIVE="mcpal-${{ github.ref_name }}-${{ matrix.target }}.tar.gz"
          tar -czf "dist/$ARCHIVE" \
            -C "target/${{ matrix.target }}/release" mcpal \
            -C "$GITHUB_WORKSPACE" README.md LICENSE-MIT LICENSE-APACHE
          (cd dist && shasum -a 256 "$ARCHIVE" > "$ARCHIVE.sha256")
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: dist/*

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
