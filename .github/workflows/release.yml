name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-latest, target: aarch64-apple-darwin, ext: tar.gz }
          - { os: macos-latest, target: x86_64-apple-darwin, ext: tar.gz }
          - { os: ubuntu-latest, target: x86_64-unknown-linux-gnu, ext: tar.gz }
          - { os: windows-latest, target: x86_64-pc-windows-msvc, ext: zip }
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release --target ${{ matrix.target }} -p mcpal-cli

      - name: package (unix)
        if: matrix.ext == 'tar.gz'
        shell: bash
        run: |
          set -eu
          mkdir -p dist
          ARCHIVE="mcpal-${{ github.ref_name }}-${{ matrix.target }}.tar.gz"
          tar -czf "dist/$ARCHIVE" \
            -C "target/${{ matrix.target }}/release" mcpal \
            -C "$GITHUB_WORKSPACE" README.md LICENSE
          (cd dist && shasum -a 256 "$ARCHIVE" > "$ARCHIVE.sha256")

      - name: package (windows)
        if: matrix.ext == 'zip'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $archive = "mcpal-${{ github.ref_name }}-${{ matrix.target }}.zip"
          $bin = "target/${{ matrix.target }}/release/mcpal.exe"
          Compress-Archive -Path $bin, README.md, LICENSE -DestinationPath "dist/$archive"
          (Get-FileHash "dist/$archive" -Algorithm SHA256).Hash | Out-File "dist/$archive.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: dist/*

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
