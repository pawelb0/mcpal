name: deb

# release.published doesn't fire when cargo-dist publishes via GITHUB_TOKEN
# (Actions prevents workflows from triggering each other). Chain on the
# Release workflow finishing instead; manual dispatch stays as a fallback.
on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to attach the .deb to"
        required: true

permissions:
  contents: write

jobs:
  build:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.event.workflow_run.head_branch }}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.tag }}

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-deb
        run: cargo install --locked cargo-deb

      - name: Build mcpal release binary
        run: cargo build --release -p mcpal

      - name: Build .deb
        run: cargo deb -p mcpal --no-build

      - name: Stable + versioned filenames
        run: |
          set -euo pipefail
          original=$(ls target/debian/mcpal_*_amd64.deb)
          cp "$original" target/debian/mcpal_amd64.deb

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          gh release upload "$TAG" \
            target/debian/mcpal_amd64.deb \
            target/debian/mcpal_*_amd64.deb \
            --clobber
