[book]
title = "mcpal — curl for MCP"
description = "User manual for the mcpal command-line client for the Model Context Protocol"
authors = ["Paweł B. <pawelb@fastmail.com>"]
language = "en"
multilingual = false
src = "src"

[output.html]
default-theme = "navy"
preferred-dark-theme = "ayu"
git-repository-url = "https://github.com/pawelb0/mcpal"
edit-url-template = "https://github.com/pawelb0/mcpal/edit/main/book/{path}"

[output.html.print]
enable = true
